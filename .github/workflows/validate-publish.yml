name: validate-publish
on:
  pull_request:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate library + rebuild dist
        run: python3 tools/lib-validate.py
      - name: dist/ must be committed and up to date
        run: |
          if ! git diff --quiet -- dist/; then
            echo "::error::dist/ is stale — run 'python3 tools/lib-validate.py' and commit dist/ in your PR."
            git --no-pager diff --stat -- dist/
            exit 1
          fi
          echo "dist/ is fresh"
